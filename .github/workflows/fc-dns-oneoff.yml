name: One-off DNS record for fc subdomain

# Temporary helper: creates the CNAME fc -> flavia-cavalcante.pages.dev on the
# nicolasneumann.blog zone. Tries both repo tokens; prints which (if either)
# has zone scope. Delete this file after a successful run.

on: workflow_dispatch

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Create CNAME fc -> flavia-cavalcante.pages.dev (idempotent)
        env:
          T1: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          T2: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
        run: |
          API="https://api.cloudflare.com/client/v4"
          ZONE_ID=""
          TOKEN=""
          for NAME in T1 T2; do
            CAND=$(eval "echo \"\$$NAME\"" | tr -d '[:space:]')
            [ -z "$CAND" ] && { echo "$NAME: empty"; continue; }
            ZR=$(curl -sS "$API/zones?name=nicolasneumann.blog" -H "Authorization: Bearer $CAND")
            OK=$(echo "$ZR" | jq -r '.success')
            COUNT=$(echo "$ZR" | jq -r '.result | length? // 0')
            echo "$NAME: success=$OK zones_visible=$COUNT"
            if [ "$OK" = "true" ] && [ "$COUNT" != "0" ]; then
              ZONE_ID=$(echo "$ZR" | jq -r '.result[0].id')
              TOKEN="$CAND"
              break
            fi
            echo "$ZR" | jq -c '{errors}'
          done
          if [ -z "$ZONE_ID" ]; then
            echo "VERDICT: no available token can see the zone, CNAME not created"
            exit 1
          fi
          echo "zone: $ZONE_ID"
          EXISTING=$(curl -sS "$API/zones/$ZONE_ID/dns_records?name=fc.nicolasneumann.blog" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.result | length')
          if [ "$EXISTING" = "0" ]; then
            curl -sS -X POST "$API/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"fc","content":"flavia-cavalcante.pages.dev","proxied":true}' \
              | jq '{success, errors, record: .result.name}'
          else
            echo "record already exists, nothing to do"
          fi
